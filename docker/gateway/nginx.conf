map $http_x_forwarded_proto $interlock_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $interlock_forwarded_host {
    default $http_x_forwarded_host;
    "" $host;
}

map $http_x_forwarded_port $interlock_forwarded_port {
    default $http_x_forwarded_port;
    "" $server_port;
}

map $interlock_forwarded_proto $interlock_forwarded_ssl {
    https on;
    default off;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1g;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1/32;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate";
    }

    location /static/ {
        alias /srv/interlock-static/;
        access_log off;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~ ^/(api|admin|openid|\.well-known)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $interlock_forwarded_host;
        proxy_set_header X-Forwarded-Port $interlock_forwarded_port;
        proxy_set_header X-Forwarded-Proto $interlock_forwarded_proto;
        proxy_set_header X-Forwarded-Ssl $interlock_forwarded_ssl;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        send_timeout 300s;

        add_header Cache-Control "no-cache, no-store, max-age=0, must-revalidate";
    }
}
